name: Release Foundry Module

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate tag matches module version
        shell: pwsh
        run: |
          $module = Get-Content -Raw "module.json" | ConvertFrom-Json
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''

          if ($module.version -ne $tagVersion) {
            throw "module.json version '$($module.version)' does not match tag '$tagVersion'."
          }

      - name: Create release archive
        run: |
          zip -r dnd5e-2024-encounter.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "release-guide.md" \
            -x "module.zip" \
            -x ".gitignore"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dnd5e-2024-encounter.zip
            module.json
